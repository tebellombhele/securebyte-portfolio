openapi: 3.1.0

info:
  title: SecureByte API
  version: 1.0.0
  description: |
    REST API for SecureByte — a multi-tenant, multi-cloud compliance automation engine.

    The API covers six functional domains:
    - Authentication & MFA
    - Cloud Credential management
    - Asset Discovery & Scanning
    - Compliance Controls & Results
    - Remediation
    - Reports & Exports

    **Authentication:** All protected endpoints require a Bearer JWT access token
    in the `Authorization` header. Tokens are issued after successful email/password
    authentication and TOTP verification. Access tokens expire after 15 minutes;
    refresh tokens (HttpOnly cookie) are valid for 7 days.

    **Multi-tenancy:** All data is scoped to the authenticated user's organisation.
    Cross-tenant access is not possible through this API.

    **Versioning:** All endpoints are prefixed `/api/v1`.

    **Envelope:** Every response conforms to the standard response envelope defined
    in the `SuccessEnvelope` and `ErrorEnvelope` schemas.

  contact:
    name: Tebello Mbhele — Founding Engineer
    email: securebyte.consulting@gmail.com
    url: https://github.com/tebellombhele

  license:
    name: Proprietary

servers:
  - url: https://TBD.vercel.app/api/v1
    description: Production (Vercel — URL confirmed on deployment)
  - url: http://localhost:4000/api/v1
    description: Local development

tags:
  - name: Authentication
    description: Login, MFA verification, token refresh, and logout
  - name: Cloud Credentials
    description: Register, list, test, and remove cloud provider credentials
  - name: Asset Discovery
    description: Trigger scans, list discovered assets, and check scan job status
  - name: Compliance Controls
    description: List control rules, fetch results, and query compliance posture
  - name: Remediation
    description: Trigger remediation actions and retrieve remediation logs
  - name: Reports
    description: Generate, list, and download compliance reports and exports

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------

paths:

  # -------------------------------------------------------------------------
  # AUTHENTICATION
  # -------------------------------------------------------------------------

  /auth/login:
    post:
      tags: [Authentication]
      operationId: loginUser
      summary: Initiate login
      description: |
        Validates email and password. On success, returns a short-lived MFA
        challenge token (5-minute TTL). This token must be presented alongside
        a valid TOTP code to complete authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: tibi@acme.co.za
              password: "S3cur3P@ssw0rd!"
      responses:
        '200':
          description: Credentials valid — MFA challenge issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MfaChallengeResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/mfa/verify:
    post:
      tags: [Authentication]
      operationId: verifyMfa
      summary: Complete MFA and issue session tokens
      description: |
        Accepts the MFA challenge token from `/auth/login` and a valid TOTP code.
        On success, returns a short-lived access token and sets an HttpOnly refresh
        token cookie. The access token must be sent as `Authorization: Bearer <token>`
        on all subsequent requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: MFA verified — session established
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie (7-day TTL)
              schema:
                type: string
                example: refreshToken=eyJ...; HttpOnly; Secure; SameSite=Strict; Path=/auth/refresh
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Authentication]
      operationId: refreshTokens
      summary: Rotate access and refresh tokens
      description: |
        Issues a new access token and refresh token using the HttpOnly refresh
        cookie. The previous refresh token is immediately invalidated. Reuse of
        an invalidated refresh token is treated as a compromise event and
        terminates all active sessions for the user.
      responses:
        '200':
          description: Tokens rotated
          headers:
            Set-Cookie:
              description: New HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'

  /auth/logout:
    post:
      tags: [Authentication]
      operationId: logoutUser
      summary: Invalidate current session
      description: |
        Invalidates the current refresh token and clears the HttpOnly cookie.
        The access token remains technically valid until its 15-minute TTL
        expires; clients should discard it immediately on logout.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Session invalidated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorised'

  /auth/mfa/setup:
    post:
      tags: [Authentication]
      operationId: setupMfa
      summary: Initialise TOTP setup for the authenticated user
      description: |
        Generates a TOTP secret and returns a `otpauthUrl` for QR code rendering
        and a plaintext `secret` for manual entry. The setup is not activated
        until `/auth/mfa/confirm` is called with a valid TOTP code.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: TOTP secret generated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MfaSetupResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'

  /auth/mfa/confirm:
    post:
      tags: [Authentication]
      operationId: confirmMfa
      summary: Confirm and activate TOTP setup
      description: |
        Activates MFA for the authenticated user by verifying the first TOTP code
        against the pending secret. Returns single-use backup codes — these are
        shown once and never again.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaConfirmRequest'
      responses:
        '200':
          description: MFA activated — backup codes returned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MfaBackupCodesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'

  # -------------------------------------------------------------------------
  # CLOUD CREDENTIALS
  # -------------------------------------------------------------------------

  /credentials:
    get:
      tags: [Cloud Credentials]
      operationId: listCredentials
      summary: List cloud credentials for the organisation
      description: |
        Returns all registered cloud credentials for the authenticated user's
        organisation. Sensitive values (access keys, secrets) are never returned
        — only metadata and status.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: provider
          in: query
          description: Filter by cloud provider
          schema:
            $ref: '#/components/schemas/CloudProvider'
      responses:
        '200':
          description: Credential list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/CredentialSummary'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorised'

    post:
      tags: [Cloud Credentials]
      operationId: registerCredential
      summary: Register a new cloud credential
      description: |
        Registers and encrypts a cloud provider credential. The raw secret values
        are encrypted with AES-256-GCM immediately on receipt and are never stored
        in plaintext. The credential is validated by calling a low-privilege
        provider API before persisting.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCredentialRequest'
      responses:
        '201':
          description: Credential registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CredentialSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '422':
          $ref: '#/components/responses/ValidationError'

  /credentials/{credentialId}:
    get:
      tags: [Cloud Credentials]
      operationId: getCredential
      summary: Get credential metadata
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CredentialIdParam'
      responses:
        '200':
          description: Credential metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CredentialSummary'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Cloud Credentials]
      operationId: deleteCredential
      summary: Remove a cloud credential
      description: |
        Soft-deletes the credential record. Any assets discovered using this
        credential are retained for audit purposes. Scheduled scans using this
        credential are cancelled.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CredentialIdParam'
      responses:
        '200':
          description: Credential removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'

  /credentials/{credentialId}/test:
    post:
      tags: [Cloud Credentials]
      operationId: testCredential
      summary: Validate a stored credential against its provider
      description: |
        Decrypts the stored credential and attempts a low-privilege provider API
        call (e.g. AWS `GetCallerIdentity`) to confirm it is valid and has the
        expected permissions. Returns the resolved identity and permission scope.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CredentialIdParam'
      responses:
        '200':
          description: Credential valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CredentialTestResult'
        '400':
          description: Credential invalid or permission insufficient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'

  # -------------------------------------------------------------------------
  # ASSET DISCOVERY & SCANNING
  # -------------------------------------------------------------------------

  /cloud/scan:
    post:
      tags: [Asset Discovery]
      operationId: triggerScan
      summary: Trigger an asset discovery scan
      description: |
        Enqueues a `CLOUD_DISCOVERY_JOB` for the specified credential. Returns
        immediately with a `jobId`. Use `GET /jobs/{jobId}` to poll status, or
        subscribe to the SSE stream at `/jobs/{jobId}/events` for real-time
        progress updates.

        On completion, a `COMPLIANCE_SCAN_JOB` is automatically enqueued
        against the discovered assets.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerScanRequest'
      responses:
        '202':
          description: Scan job enqueued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JobAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'

  /assets:
    get:
      tags: [Asset Discovery]
      operationId: listAssets
      summary: List discovered assets for the organisation
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: provider
          in: query
          schema:
            $ref: '#/components/schemas/CloudProvider'
        - name: type
          in: query
          description: Filter by asset type
          schema:
            $ref: '#/components/schemas/AssetType'
        - name: region
          in: query
          schema:
            type: string
            example: af-south-1
        - name: search
          in: query
          description: Partial match on asset name or externalId
          schema:
            type: string
      responses:
        '200':
          description: Asset list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AssetSummary'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorised'

  /assets/{assetId}:
    get:
      tags: [Asset Discovery]
      operationId: getAsset
      summary: Get full asset record including raw configuration
      description: |
        Returns the full asset record including the `configuration` JSONB field
        containing the raw provider API response. This is the same data the
        compliance engine evaluates against control rules.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
      responses:
        '200':
          description: Full asset record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AssetDetail'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{jobId}:
    get:
      tags: [Asset Discovery]
      operationId: getJobStatus
      summary: Get scan job status and summary
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ScanJobDetail'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{jobId}/events:
    get:
      tags: [Asset Discovery]
      operationId: subscribeJobEvents
      summary: Subscribe to real-time job progress via Server-Sent Events
      description: |
        Opens an SSE stream for the specified job. The server pushes progress
        events as the job executes. The stream closes automatically when the
        job reaches a terminal state (`COMPLETED`, `FAILED`, `PARTIAL_FAILURE`).

        **Event types:**
        - `progress` — asset count update during discovery
        - `control_result` — individual control evaluation result during compliance scan
        - `completed` — job finished successfully
        - `failed` — job exhausted retries
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
      responses:
        '200':
          description: SSE stream opened
          content:
            text/event-stream:
              schema:
                type: string
                description: Stream of SSE-formatted events
                example: |
                  event: progress
                  data: {"assetsDiscovered": 47, "total": 120}

                  event: completed
                  data: {"jobId": "job_01HXYZ", "status": "COMPLETED", "summary": {...}}
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'

  # -------------------------------------------------------------------------
  # COMPLIANCE CONTROLS & RESULTS
  # -------------------------------------------------------------------------

  /controls:
    get:
      tags: [Compliance Controls]
      operationId: listControls
      summary: List all available control rules
      description: |
        Returns the full library of control rules available to the organisation's
        enabled frameworks. Results include the property path, operator, expected
        value, and remediation steps for each rule.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: framework
          in: query
          schema:
            $ref: '#/components/schemas/ComplianceFramework'
        - name: severity
          in: query
          schema:
            $ref: '#/components/schemas/Severity'
        - name: assetType
          in: query
          schema:
            $ref: '#/components/schemas/AssetType'
      responses:
        '200':
          description: Control rule list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ControlRule'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorised'

  /controls/scan-all:
    post:
      tags: [Compliance Controls]
      operationId: triggerFullComplianceScan
      summary: Trigger a compliance scan across all discovered assets
      description: |
        Enqueues a `COMPLIANCE_SCAN_JOB` covering all current assets for the
        organisation. Use this to force a full re-evaluation outside of the
        automatic post-discovery trigger.
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceScanRequest'
      responses:
        '202':
          description: Compliance scan enqueued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JobAcceptedResponse'
        '401':
          $ref: '#/components/responses/Unauthorised'

  /controls/results:
    get:
      tags: [Compliance Controls]
      operationId: listControlResults
      summary: List control evaluation results
      description: |
        Returns `ControlResult` records for the organisation. Supports filtering
        by framework, severity, status, asset, and freshness. Stale results
        (where `scannedAt` > `staleBefore`) are flagged in the response.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: framework
          in: query
          schema:
            $ref: '#/components/schemas/ComplianceFramework'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ResultStatus'
        - name: severity
          in: query
          schema:
            $ref: '#/components/schemas/Severity'
        - name: assetId
          in: query
          schema:
            type: string
        - name: includeStale
          in: query
          description: Include results past their staleBefore TTL (default false)
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Control result list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ControlResult'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorised'

  /controls/posture:
    get:
      tags: [Compliance Controls]
      operationId: getCompliancePosture
      summary: Get aggregated compliance posture scores per framework
      description: |
        Returns pass/fail ratios, control counts by severity, and an overall
        posture score (0–100) per framework. Results are served from the Redis
        aggregate cache (60-second TTL) and refreshed after each completed scan.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Compliance posture summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/FrameworkPosture'
        '401':
          $ref: '#/components/responses/Unauthorised'

  /controls/results/{resultId}:
    get:
      tags: [Compliance Controls]
      operationId: getControlResult
      summary: Get a single control result with full evidence
      description: |
        Returns the full `ControlResult` record including the `evidence` fragment —
        the raw provider API response property that was evaluated. This is the
        audit-grade evidence attached to each control evaluation.
      security:
        - BearerAuth: []
      parameters:
        - name: resultId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Control result with evidence
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ControlResultDetail'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'

  # -------------------------------------------------------------------------
  # REMEDIATION
  # -------------------------------------------------------------------------

  /remediation:
    post:
      tags: [Remediation]
      operationId: triggerRemediation
      summary: Trigger a remediation action for a failing control result
      description: |
        Enqueues a remediation action for the specified `ControlResult`. All
        remediation actions are non-destructive: they modify configurations only
        and never delete cloud resources. A before-state snapshot is written to
        `RemediationLog` before any change is made.

        Remediation uses the same encrypted credential as the originating scan.
        The IAM permissions required are documented per control rule in the
        `remediationSteps` field.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerRemediationRequest'
      responses:
        '202':
          description: Remediation job enqueued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JobAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Remediation already in progress for this result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /remediation/logs:
    get:
      tags: [Remediation]
      operationId: listRemediationLogs
      summary: List remediation log entries for the organisation
      description: |
        Returns all remediation log entries. Each entry records the before-state
        snapshot, the action taken, the outcome, and the user who triggered it.
        Entries are immutable — the log is append-only.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RemediationStatus'
        - name: assetId
          in: query
          schema:
            type: string
        - name: from
          in: query
          description: ISO 8601 start date filter
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: ISO 8601 end date filter
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Remediation log list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RemediationLogEntry'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorised'

  /remediation/logs/{logId}:
    get:
      tags: [Remediation]
      operationId: getRemediationLog
      summary: Get a single remediation log entry with full before/after state
      security:
        - BearerAuth: []
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Remediation log entry
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RemediationLogDetail'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'

  # -------------------------------------------------------------------------
  # REPORTS & EXPORTS
  # -------------------------------------------------------------------------

  /reports:
    get:
      tags: [Reports]
      operationId: listReports
      summary: List generated compliance reports
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: framework
          in: query
          schema:
            $ref: '#/components/schemas/ComplianceFramework'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ReportStatus'
      responses:
        '200':
          description: Report list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ReportSummary'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorised'

    post:
      tags: [Reports]
      operationId: generateReport
      summary: Generate a new compliance report
      description: |
        Enqueues a `REPORT_GENERATION_JOB`. The report aggregates the most recent
        `ControlResult` records for the specified frameworks and formats them as a
        PDF or CSV export. The completed file is uploaded to object storage and a
        time-limited signed download URL is returned when the job completes.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateReportRequest'
      responses:
        '202':
          description: Report generation job enqueued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JobAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '422':
          $ref: '#/components/responses/ValidationError'

  /reports/{reportId}:
    get:
      tags: [Reports]
      operationId: getReport
      summary: Get report metadata and download URL
      description: |
        Returns report metadata and, if the report is complete, a signed download
        URL valid for 15 minutes. Re-request this endpoint to obtain a fresh URL
        after expiry.
      security:
        - BearerAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReportDetail'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Reports]
      operationId: deleteReport
      summary: Delete a generated report
      description: |
        Deletes the report record and the associated file from object storage.
        This action is irreversible. Reports referenced by active audit workflows
        cannot be deleted.
      security:
        - BearerAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorised'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Report is referenced by an active audit and cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

# ---------------------------------------------------------------------------
# COMPONENTS
# ---------------------------------------------------------------------------

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256-signed JWT access token. Expires after 15 minutes.

  # -------------------------------------------------------------------------
  # PARAMETERS
  # -------------------------------------------------------------------------

  parameters:

    PageParam:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      description: Results per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    CredentialIdParam:
      name: credentialId
      in: path
      required: true
      schema:
        type: string
        example: cred_01HXYZ

    AssetIdParam:
      name: assetId
      in: path
      required: true
      schema:
        type: string
        example: asset_01HABC

    JobIdParam:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        example: job_01HDEF

  # -------------------------------------------------------------------------
  # ENUMS
  # -------------------------------------------------------------------------

  schemas:

    CloudProvider:
      type: string
      enum: [AWS, AZURE, GCP]
      description: Supported cloud infrastructure providers

    AssetType:
      type: string
      enum:
        - S3_BUCKET
        - RDS_INSTANCE
        - EC2_INSTANCE
        - IAM_USER
        - IAM_ROLE
        - SECURITY_GROUP
        - AZURE_STORAGE_ACCOUNT
        - AZURE_VM
        - AZURE_SQL_DATABASE
        - GCP_STORAGE_BUCKET
        - GCP_COMPUTE_INSTANCE
        - GCP_CLOUD_SQL
      description: Normalised asset type across all supported providers

    ComplianceFramework:
      type: string
      enum: [POPIA, ISO27001, SOC2, NIST_CSF, CIS_CONTROLS]
      description: Supported compliance frameworks

    Severity:
      type: string
      enum: [CRITICAL, HIGH, MEDIUM, LOW, INFORMATIONAL]
      description: Control severity — drives staleness TTL and dashboard prioritisation

    ResultStatus:
      type: string
      enum: [PASS, FAIL, ERROR, NOT_APPLICABLE]
      description: |
        Outcome of a control evaluation.
        - `PASS`: asset configuration meets the control requirement
        - `FAIL`: asset configuration does not meet the requirement
        - `ERROR`: evaluation failed (e.g. malformed rule or missing property path)
        - `NOT_APPLICABLE`: rule does not apply to this asset in this context

    JobStatus:
      type: string
      enum: [QUEUED, ACTIVE, COMPLETED, PARTIAL_FAILURE, FAILED, WAITING]

    RemediationStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED, ROLLED_BACK]

    ReportStatus:
      type: string
      enum: [PENDING, GENERATING, COMPLETED, FAILED]

    ReportFormat:
      type: string
      enum: [PDF, CSV]

    ControlOperator:
      type: string
      enum:
        - EQUALS
        - NOT_EQUALS
        - EXISTS
        - NOT_EXISTS
        - IS_TRUE
        - IS_FALSE
        - CONTAINS
        - NOT_CONTAINS
        - MATCHES_REGEX
        - GREATER_THAN
        - LESS_THAN

    MappingType:
      type: string
      enum: [EQUIVALENT, PARTIAL, RELATED]

    # -----------------------------------------------------------------------
    # ENVELOPE SCHEMAS
    # -----------------------------------------------------------------------

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true
        data:
          description: Response payload — shape varies per endpoint
        meta:
          description: Pagination or supplementary metadata

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required: [code, message, traceId]
          properties:
            code:
              type: string
              description: Machine-readable error code (enum)
              example: CREDENTIAL_NOT_FOUND
            message:
              type: string
              description: Human-readable error description
              example: No credential found with the provided ID for this organisation
            traceId:
              type: string
              description: Request-scoped trace ID for log correlation
              example: req_01HXYZ
            fields:
              type: array
              description: Field-level validation errors (422 responses only)
              items:
                type: object
                properties:
                  field:
                    type: string
                    example: email
                  message:
                    type: string
                    example: Invalid email address

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          description: Total record count
          example: 143
        totalPages:
          type: integer
          example: 8

    # -----------------------------------------------------------------------
    # AUTH SCHEMAS
    # -----------------------------------------------------------------------

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: tibi@acme.co.za
        password:
          type: string
          minLength: 8
          example: "S3cur3P@ssw0rd!"

    MfaChallengeResponse:
      type: object
      properties:
        challengeToken:
          type: string
          description: Short-lived JWT (5-minute TTL) to present with TOTP code
          example: eyJhbGciOiJSUzI1NiJ9...
        expiresAt:
          type: string
          format: date-time

    MfaVerifyRequest:
      type: object
      required: [challengeToken, totpCode]
      properties:
        challengeToken:
          type: string
          description: Token received from /auth/login
        totpCode:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^\d{6}$'
          example: "482910"

    SessionResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: RS256-signed JWT (15-minute TTL)
          example: eyJhbGciOiJSUzI1NiJ9...
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserSummary'

    MfaSetupResponse:
      type: object
      properties:
        secret:
          type: string
          description: Base32 TOTP secret for manual authenticator entry
          example: JBSWY3DPEHPK3PXP
        otpauthUrl:
          type: string
          description: otpauth:// URL for QR code rendering
          example: otpauth://totp/SecureByte:tibi@acme.co.za?secret=JBSWY3DP&issuer=SecureByte

    MfaConfirmRequest:
      type: object
      required: [totpCode]
      properties:
        totpCode:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^\d{6}$'
          example: "827541"

    MfaBackupCodesResponse:
      type: object
      properties:
        backupCodes:
          type: array
          description: Single-use backup codes. Shown once — store securely.
          items:
            type: string
          example: ["AAAA-BBBB-CCCC", "DDDD-EEEE-FFFF", "GGGG-HHHH-IIII"]

    UserSummary:
      type: object
      properties:
        id:
          type: string
          example: usr_01HABC
        email:
          type: string
          format: email
        name:
          type: string
          example: Tebello Mbhele
        role:
          type: string
          enum: [OWNER, ADMIN, AUDITOR, VIEWER]
        mfaEnabled:
          type: boolean
        organisationId:
          type: string
          example: org_01HXYZ

    # -----------------------------------------------------------------------
    # CREDENTIAL SCHEMAS
    # -----------------------------------------------------------------------

    RegisterCredentialRequest:
      type: object
      required: [provider, label]
      properties:
        provider:
          $ref: '#/components/schemas/CloudProvider'
        label:
          type: string
          description: Human-readable name for this credential
          example: Production AWS — af-south-1
        aws:
          $ref: '#/components/schemas/AwsCredentialInput'
        azure:
          $ref: '#/components/schemas/AzureCredentialInput'
        gcp:
          $ref: '#/components/schemas/GcpCredentialInput'

    AwsCredentialInput:
      type: object
      required: [accessKeyId, secretAccessKey]
      properties:
        accessKeyId:
          type: string
          example: AKIAIOSFODNN7EXAMPLE
        secretAccessKey:
          type: string
          description: Encrypted immediately on receipt — never stored in plaintext
          example: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
        roleArn:
          type: string
          description: Optional IAM Role ARN to assume after authentication
          example: arn:aws:iam::123456789012:role/SecureByteAuditRole
        region:
          type: string
          default: us-east-1
          example: af-south-1

    AzureCredentialInput:
      type: object
      required: [tenantId, clientId, clientSecret, subscriptionId]
      properties:
        tenantId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        clientSecret:
          type: string
          description: Encrypted immediately on receipt
        subscriptionId:
          type: string
          format: uuid

    GcpCredentialInput:
      type: object
      required: [serviceAccountJson]
      properties:
        serviceAccountJson:
          type: string
          description: Full GCP service account key JSON — encrypted immediately on receipt
          example: '{"type":"service_account","project_id":"my-project",...}'

    CredentialSummary:
      type: object
      properties:
        id:
          type: string
          example: cred_01HXYZ
        provider:
          $ref: '#/components/schemas/CloudProvider'
        label:
          type: string
          example: Production AWS — af-south-1
        status:
          type: string
          enum: [ACTIVE, INVALID, UNTESTED]
        lastTestedAt:
          type: string
          format: date-time
          nullable: true
        lastScanAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    CredentialTestResult:
      type: object
      properties:
        valid:
          type: boolean
        resolvedIdentity:
          type: string
          description: Provider-reported identity (e.g. AWS ARN, Azure principal)
          example: arn:aws:iam::123456789012:user/securebyte-audit
        permissionsVerified:
          type: array
          items:
            type: string
          description: List of verified permission checks
          example: ["DescribeInstances", "GetBucketEncryption", "DescribeDBInstances"]
        testedAt:
          type: string
          format: date-time

    # -----------------------------------------------------------------------
    # ASSET SCHEMAS
    # -----------------------------------------------------------------------

    TriggerScanRequest:
      type: object
      required: [credentialId]
      properties:
        credentialId:
          type: string
          example: cred_01HXYZ
        assetTypes:
          type: array
          description: Limit discovery to specific asset types (default — all)
          items:
            $ref: '#/components/schemas/AssetType'
        regions:
          type: array
          description: Limit discovery to specific regions (default — all)
          items:
            type: string
          example: ["af-south-1", "eu-west-1"]

    AssetSummary:
      type: object
      properties:
        id:
          type: string
          example: asset_01HABC
        externalId:
          type: string
          description: Provider-native ID or ARN
          example: arn:aws:s3:::my-production-bucket
        name:
          type: string
          example: my-production-bucket
        type:
          $ref: '#/components/schemas/AssetType'
        provider:
          $ref: '#/components/schemas/CloudProvider'
        region:
          type: string
          example: af-south-1
        discoveredAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        complianceSummary:
          type: object
          description: Latest pass/fail count across all evaluated controls
          properties:
            pass:
              type: integer
            fail:
              type: integer
            error:
              type: integer

    AssetDetail:
      allOf:
        - $ref: '#/components/schemas/AssetSummary'
        - type: object
          properties:
            accountId:
              type: string
              example: "123456789012"
            tags:
              type: object
              additionalProperties:
                type: string
              example:
                Environment: production
                Team: platform
            configuration:
              type: object
              description: Raw provider API response stored as JSONB

    JobAcceptedResponse:
      type: object
      properties:
        jobId:
          type: string
          example: job_01HDEF
        status:
          type: string
          enum: [QUEUED]
        eventsUrl:
          type: string
          description: SSE endpoint for real-time progress updates
          example: /api/v1/jobs/job_01HDEF/events

    ScanJobDetail:
      type: object
      properties:
        id:
          type: string
          example: job_01HDEF
        type:
          type: string
          enum: [CLOUD_DISCOVERY_JOB, COMPLIANCE_SCAN_JOB, REPORT_GENERATION_JOB]
        status:
          $ref: '#/components/schemas/JobStatus'
        credentialId:
          type: string
          nullable: true
        progress:
          type: object
          properties:
            assetsDiscovered:
              type: integer
            controlsEvaluated:
              type: integer
            totalAssets:
              type: integer
              nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string
          nullable: true
          description: Error message if the job failed

    # -----------------------------------------------------------------------
    # COMPLIANCE SCHEMAS
    # -----------------------------------------------------------------------

    ControlRule:
      type: object
      properties:
        id:
          type: string
          example: rule_01HPOPIA
        code:
          type: string
          example: POPIA-S19-01
        framework:
          $ref: '#/components/schemas/ComplianceFramework'
        title:
          type: string
          example: S3 Bucket Server-Side Encryption Enabled
        description:
          type: string
        rationale:
          type: string
          description: Legal or technical basis for the control
        assetType:
          $ref: '#/components/schemas/AssetType'
        propertyPath:
          type: string
          description: JSONPath expression evaluated against Asset.configuration
          example: $.ServerSideEncryptionConfiguration.Rules[0].ApplyServerSideEncryptionByDefault.SSEAlgorithm
        operator:
          $ref: '#/components/schemas/ControlOperator'
        expectedValue:
          type: string
          example: AES256
        severity:
          $ref: '#/components/schemas/Severity'
        remediationSteps:
          type: array
          items:
            type: string
          example:
            - Navigate to S3 > Bucket > Properties > Default encryption
            - Select Server-side encryption with Amazon S3-managed keys (SSE-S3)
            - Save changes
        references:
          type: array
          items:
            type: string
            format: uri

    ComplianceScanRequest:
      type: object
      properties:
        frameworks:
          type: array
          description: Limit scan to specific frameworks (default — all enabled)
          items:
            $ref: '#/components/schemas/ComplianceFramework'
        assetIds:
          type: array
          description: Limit scan to specific assets (default — all)
          items:
            type: string

    ControlResult:
      type: object
      properties:
        id:
          type: string
          example: result_01HABC
        assetId:
          type: string
          example: asset_01HABC
        assetName:
          type: string
          example: my-production-bucket
        ruleId:
          type: string
        ruleCode:
          type: string
          example: POPIA-S19-01
        ruleTitle:
          type: string
          example: S3 Bucket Server-Side Encryption Enabled
        framework:
          $ref: '#/components/schemas/ComplianceFramework'
        severity:
          $ref: '#/components/schemas/Severity'
        status:
          $ref: '#/components/schemas/ResultStatus'
        actualValue:
          type: string
          nullable: true
          example: "null"
        expectedValue:
          type: string
          example: AES256
        scannedAt:
          type: string
          format: date-time
        staleBefore:
          type: string
          format: date-time
        isStale:
          type: boolean
          description: True if scannedAt is past staleBefore

    ControlResultDetail:
      allOf:
        - $ref: '#/components/schemas/ControlResult'
        - type: object
          properties:
            evidence:
              type: object
              description: |
                Raw provider API response fragment used during evaluation.
                This constitutes the audit evidence for this control result.
            rule:
              $ref: '#/components/schemas/ControlRule'

    FrameworkPosture:
      type: object
      properties:
        framework:
          $ref: '#/components/schemas/ComplianceFramework'
        score:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Overall compliance score as a percentage of passing controls
          example: 74.3
        totalControls:
          type: integer
        passingControls:
          type: integer
        failingControls:
          type: integer
        errorControls:
          type: integer
        byseverity:
          type: object
          properties:
            critical:
              $ref: '#/components/schemas/SeverityBreakdown'
            high:
              $ref: '#/components/schemas/SeverityBreakdown'
            medium:
              $ref: '#/components/schemas/SeverityBreakdown'
            low:
              $ref: '#/components/schemas/SeverityBreakdown'
        lastEvaluatedAt:
          type: string
          format: date-time
        cacheExpiresAt:
          type: string
          format: date-time
          description: When the dashboard cache entry for this framework expires

    SeverityBreakdown:
      type: object
      properties:
        pass:
          type: integer
        fail:
          type: integer
        total:
          type: integer

    # -----------------------------------------------------------------------
    # REMEDIATION SCHEMAS
    # -----------------------------------------------------------------------

    TriggerRemediationRequest:
      type: object
      required: [controlResultId]
      properties:
        controlResultId:
          type: string
          description: The failing ControlResult to remediate
          example: result_01HABC
        dryRun:
          type: boolean
          default: false
          description: |
            If true, simulates the remediation and returns what would change
            without making any provider API calls.

    RemediationLogEntry:
      type: object
      properties:
        id:
          type: string
          example: remlog_01HXYZ
        controlResultId:
          type: string
        assetId:
          type: string
        assetName:
          type: string
        ruleCode:
          type: string
          example: POPIA-S19-01
        ruleTitle:
          type: string
        status:
          $ref: '#/components/schemas/RemediationStatus'
        triggeredBy:
          type: string
          description: User ID who triggered the remediation
        isDryRun:
          type: boolean
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    RemediationLogDetail:
      allOf:
        - $ref: '#/components/schemas/RemediationLogEntry'
        - type: object
          properties:
            beforeState:
              type: object
              description: Snapshot of the relevant asset configuration before remediation
            afterState:
              type: object
              description: Asset configuration after remediation (null if failed or dry-run)
              nullable: true
            error:
              type: string
              nullable: true
              description: Error detail if remediation failed

    # -----------------------------------------------------------------------
    # REPORT SCHEMAS
    # -----------------------------------------------------------------------

    GenerateReportRequest:
      type: object
      required: [frameworks, format]
      properties:
        frameworks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ComplianceFramework'
          example: [POPIA, ISO27001]
        format:
          $ref: '#/components/schemas/ReportFormat'
        title:
          type: string
          description: Optional custom report title
          example: Q1 2026 POPIA Compliance Audit Report
        includeEvidence:
          type: boolean
          default: true
          description: Include raw evidence fragments in the report
        includeRemediationSteps:
          type: boolean
          default: true

    ReportSummary:
      type: object
      properties:
        id:
          type: string
          example: report_01HABC
        title:
          type: string
        frameworks:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceFramework'
        format:
          $ref: '#/components/schemas/ReportFormat'
        status:
          $ref: '#/components/schemas/ReportStatus'
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    ReportDetail:
      allOf:
        - $ref: '#/components/schemas/ReportSummary'
        - type: object
          properties:
            downloadUrl:
              type: string
              format: uri
              nullable: true
              description: Signed URL valid for 15 minutes (null if report not yet complete)
              example: https://TBD.vercel.app/storage/reports/report_01HABC.pdf?token=...
            urlExpiresAt:
              type: string
              format: date-time
              nullable: true
            fileSizeBytes:
              type: integer
              nullable: true
            controlCount:
              type: integer
              description: Total controls included in this report
            passingCount:
              type: integer
            failingCount:
              type: integer

  # -------------------------------------------------------------------------
  # REUSABLE RESPONSES
  # -------------------------------------------------------------------------

  responses:

    BadRequest:
      description: Bad request — invalid input or business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: INVALID_REQUEST
              message: credentialId is required
              traceId: req_01HXYZ

    Unauthorised:
      description: Missing, expired, or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: TOKEN_EXPIRED
              message: Access token has expired
              traceId: req_01HXYZ

    Forbidden:
      description: Authenticated but insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: INSUFFICIENT_PERMISSIONS
              message: AUDITOR role cannot trigger remediation actions
              traceId: req_01HXYZ

    NotFound:
      description: Resource not found or not accessible to this organisation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: RESOURCE_NOT_FOUND
              message: No credential found with the provided ID for this organisation
              traceId: req_01HXYZ

    ValidationError:
      description: Request body failed schema validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Request body validation failed
              traceId: req_01HXYZ
              fields:
                - field: email
                  message: Invalid email address
                - field: password
                  message: Password must be at least 8 characters

    RateLimited:
      description: Too many requests — rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until the rate limit window resets
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error:
              code: RATE_LIMIT_EXCEEDED
              message: Too many login attempts. Try again in 60 seconds.
              traceId: req_01HXYZ
